<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일기장 - {{ year or '전체' }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #fff; color: #333; padding: 40px; max-width: 800px; margin: 0 auto; }
        .print-header { text-align: center; margin-bottom: 40px; }
        .print-header h1 { font-size: 22px; color: #1A73E8; }
        .print-header p { font-size: 13px; color: #999; margin-top: 4px; }
        .toolbar { display: flex; gap: 8px; justify-content: center; margin-bottom: 30px; }
        .toolbar button { padding: 8px 20px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
        .toolbar button:hover { background: #f0f0f0; }
        .toolbar .btn-pdf { background: #1A73E8; color: #fff; border-color: #1A73E8; }
        .toolbar .btn-pdf:hover { background: #1558b0; }
        .entry { margin-bottom: 36px; page-break-inside: avoid; }
        .entry-header { border-bottom: 2px solid #1A73E8; padding-bottom: 8px; margin-bottom: 12px; }
        .entry-date { font-size: 12px; color: #999; }
        .entry-title { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .entry-mood { font-size: 16px; margin-left: 6px; }
        .entry-event { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 6px; font-size: 13px; color: #666; line-height: 1.6; }
        .entry-event-label { font-size: 11px; color: #1A73E8; font-weight: bold; margin-right: 6px; }
        .entry-content { font-size: 14px; line-height: 1.9; white-space: pre-wrap; word-break: break-word; }
        .no-entries { text-align: center; color: #999; padding: 60px; }
        @media print {
            .toolbar { display: none; }
            body { padding: 20px; }
            .entry { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="print-header">
        <h1>{{ user.name }}의 일기장</h1>
        <p>{{ year or '전체' }}년</p>
    </div>
    <div class="toolbar">
        <button class="btn-pdf" onclick="window.print()">PDF로 저장 (인쇄)</button>
        <button onclick="location.href='/diary/download/txt?year={{ year or '' }}'">텍스트 파일 다운로드</button>
        <button onclick="history.back()">돌아가기</button>
    </div>
    {% if entries %}
        {% for e in entries %}
        <div class="entry">
            <div class="entry-header">
                <div class="entry-date">{{ e.date_str }}</div>
                <div class="entry-title">{{ e.title or '무제' }}{% if e.mood %} <span class="entry-mood">{{ e.mood }}</span>{% endif %}</div>
            </div>
            {% if e.event %}
            <div class="entry-event"><span class="entry-event-label">이벤트</span>{{ e.event }}</div>
            {% endif %}
            <div class="entry-content">{{ e.content or '' }}</div>
        </div>
        {% endfor %}
    {% else %}
        <div class="no-entries">작성된 일기가 없습니다.</div>
    {% endif %}
</body>
</html>
